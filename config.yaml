# UnifiedIntelligence Configuration
# All values can be overridden by environment variables

# Server configuration
server:
  name: "unified-intelligence"
  version: "3.0.0"
  default_instance_id: "test"

# Redis configuration
redis:
  # Connection settings
  host: "localhost"
  port: 6379
  database: 0
  # Password can be set via REDIS_PASSWORD or REDIS_PASS env vars
  
  # Connection pool settings
  pool:
    max_size: 16
    timeout_seconds: 5
    create_timeout_seconds: 5
    recycle_timeout_seconds: 5
  
  # Default TTL for Redis keys (7 days)
  default_ttl_seconds: 604800

# Rate limiting configuration
rate_limiter:
  # Maximum requests per time window
  max_requests: 100
  # Time window in seconds
  window_seconds: 60

# Event stream configuration
event_stream:
  # Maximum events to keep per stream
  max_length: 10000
  # Use approximate trimming for performance
  approximate_trimming: true

# Bloom filter configuration
bloom_filter:
  # False positive rate
  error_rate: 0.01
  # Expected number of items
  expected_items: 100000

# Time series configuration
time_series:
  # Retention period in milliseconds (24 hours)
  retention_ms: 86400000
  # Duplicate policy
  duplicate_policy: "SUM"

# Retry configuration
retry:
  # Maximum retry attempts
  max_attempts: 3
  # Initial delay in milliseconds
  initial_delay_ms: 100
  # Maximum delay in milliseconds
  max_delay_ms: 5000
  # Exponential backoff base
  backoff_base: 2.0
  # Jitter factor (0.0 to 1.0)
  jitter_factor: 0.1